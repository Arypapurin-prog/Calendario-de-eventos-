<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario de Eventos</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🎌 Calendario de Eventos</h1>

        <form id="eventForm">

            <input 
                type="text" 
                id="title"
                placeholder="Nombre del evento"
            >

            <input 
                type="date" 
                id="date"
            >

            <input 
                type="text" 
                id="category"
                placeholder="Categoría"
            >

            <button type="submit">
                Agregar Evento
            </button>

        </form>

        <p id="message"></p>

        <div class="stats">
            Eventos registrados:
            <span id="totalEvents">0</span>
        </div>

        <ul id="eventList"></ul>

    </div>

    <script src="script.js"></script>

</body>
</html>
